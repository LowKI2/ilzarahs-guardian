<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilzarah's Guardian — Prototype</title>
<style>
/* ═══════════════════════════════════════════════════════
   ILZARAH'S GUARDIAN — CSS
   Palette: Amber (#D4A03C), Cyan (#00D4FF), Red (#FF3344)
   Background: Dark industrial (#0D0D0F, #1A1A1F)
   ═══════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0D0D0F;
  color: #C8B88A;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

#gameContainer {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

canvas {
  display: block;
  background: #0D0D0F;
}

/* ── HUD Overlay ── */
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: linear-gradient(180deg, rgba(13,13,15,0.95) 0%, rgba(13,13,15,0.7) 100%);
  border-bottom: 1px solid rgba(212,160,60,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  z-index: 10;
  pointer-events: none;
}

.hud-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hud-label { color: rgba(200,184,138,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.hud-value { color: #D4A03C; font-size: 16px; font-weight: 700; }
.hud-value.cyan { color: #00D4FF; }
.hud-value.red { color: #FF3344; }

/* ── Station Selection Screen ── */
#stationSelect {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, #1A1A1F 0%, #0D0D0F 70%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#stationSelect h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 42px;
  font-weight: 700;
  color: #D4A03C;
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(212,160,60,0.4);
}

#stationSelect .subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: rgba(200,184,138,0.4);
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.station-grid {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 900px;
}

.station-card {
  width: 160px;
  background: linear-gradient(180deg, rgba(26,26,31,0.9) 0%, rgba(13,13,15,0.95) 100%);
  border: 1px solid rgba(212,160,60,0.2);
  border-radius: 4px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  pointer-events: auto;
  position: relative;
  overflow: hidden;
}

.station-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #D4A03C, transparent);
  opacity: 0;
  transition: opacity 0.2s;
}

.station-card:hover {
  border-color: rgba(212,160,60,0.6);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(212,160,60,0.15);
}

.station-card:hover::before { opacity: 1; }

.station-card.locked {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
}

.station-name {
  font-size: 15px;
  font-weight: 700;
  color: #D4A03C;
  margin-bottom: 10px;
  text-align: center;
}

.station-stat {
  display: flex;
  justify-content: space-between;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  margin-bottom: 3px;
}

.station-stat .label { color: rgba(200,184,138,0.5); }
.station-stat .val { color: #C8B88A; }
.station-stat .val.dmg { color: #FF3344; }
.station-stat .val.def { color: #00D4FF; }

.station-slots {
  margin-top: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(200,184,138,0.4);
  text-align: center;
  border-top: 1px solid rgba(212,160,60,0.1);
  padding-top: 6px;
}

/* ── Build Phase UI ── */
#buildUI {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(0deg, rgba(13,13,15,0.95) 0%, rgba(13,13,15,0.7) 100%);
  border-top: 1px solid rgba(212,160,60,0.3);
  display: none;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 10;
}

.build-btn {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 24px;
  border: 1px solid rgba(212,160,60,0.4);
  background: rgba(26,26,31,0.8);
  color: #D4A03C;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.15s;
  pointer-events: auto;
}

.build-btn:hover {
  background: rgba(212,160,60,0.15);
  border-color: #D4A03C;
  box-shadow: 0 0 12px rgba(212,160,60,0.2);
}

.build-btn.start-combat {
  border-color: rgba(255,51,68,0.5);
  color: #FF3344;
}

.build-btn.start-combat:hover {
  background: rgba(255,51,68,0.15);
  border-color: #FF3344;
  box-shadow: 0 0 12px rgba(255,51,68,0.2);
}

.build-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  pointer-events: none;
}

/* ── Game Over Screen ── */
#gameOverScreen {
  position: absolute;
  inset: 0;
  background: rgba(13,13,15,0.92);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

#gameOverScreen h2 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 48px;
  font-weight: 700;
  color: #FF3344;
  text-transform: uppercase;
  letter-spacing: 6px;
  margin-bottom: 12px;
  text-shadow: 0 0 30px rgba(255,51,68,0.5);
}

#gameOverScreen .go-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  color: rgba(200,184,138,0.5);
  margin-bottom: 30px;
}

.go-stats {
  display: flex;
  gap: 40px;
  margin-bottom: 40px;
}

.go-stat {
  text-align: center;
}

.go-stat .go-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: #D4A03C;
}

.go-stat .go-label {
  font-size: 12px;
  color: rgba(200,184,138,0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.go-btn {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  padding: 14px 48px;
  border: 1px solid rgba(212,160,60,0.5);
  background: rgba(212,160,60,0.1);
  color: #D4A03C;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: all 0.2s;
  pointer-events: auto;
}

.go-btn:hover {
  background: rgba(212,160,60,0.25);
  border-color: #D4A03C;
  box-shadow: 0 0 20px rgba(212,160,60,0.3);
}

/* ── Wave Banner ── */
#waveBanner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Rajdhani', sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: #D4A03C;
  text-transform: uppercase;
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(212,160,60,0.6);
  opacity: 0;
  z-index: 50;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* ── Tooltip ── */
#tooltip {
  position: absolute;
  background: rgba(13,13,15,0.95);
  border: 1px solid rgba(212,160,60,0.4);
  padding: 8px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #C8B88A;
  pointer-events: none;
  z-index: 300;
  display: none;
  max-width: 180px;
  line-height: 1.4;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div class="hud-item">
      <span class="hud-label">Phase</span>
      <span class="hud-value" id="hudPhase">BUILD</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Welle</span>
      <span class="hud-value cyan" id="hudWave">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">VSU</span>
      <span class="hud-value" id="hudVSU">100</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Station HP</span>
      <span class="hud-value red" id="hudHP">800</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Schild</span>
      <span class="hud-value cyan" id="hudShield">200</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">EP</span>
      <span class="hud-value" id="hudEP">0</span>
    </div>
  </div>

  <!-- Station Select -->
  <div id="stationSelect">
    <h1>Ilzarah's Guardian</h1>
    <div class="subtitle">// STATION AUSWAHL //</div>
    <div class="station-grid" id="stationGrid"></div>
  </div>

  <!-- Build Phase UI -->
  <div id="buildUI">
    <button class="build-btn" id="btnTurret" onclick="game.buyTurret()">Turret (50 VSU)</button>
    <button class="build-btn" id="btnShieldGen" onclick="game.buyShieldGen()">Schild-Gen (75 VSU)</button>
    <button class="build-btn" id="btnVSUGen" onclick="game.buyVSUGen()">VSU-Gen (60 VSU)</button>
    <button class="build-btn start-combat" id="btnStartCombat" onclick="game.startCombat()">Kampf Starten</button>
  </div>

  <!-- Wave Banner -->
  <div id="waveBanner"></div>

  <!-- Game Over -->
  <div id="gameOverScreen">
    <h2 id="goTitle">Station Zerstort</h2>
    <div class="go-subtitle" id="goSubtitle">// RUN BEENDET //</div>
    <div class="go-stats">
      <div class="go-stat">
        <div class="go-val" id="goWaves">0</div>
        <div class="go-label">Wellen</div>
      </div>
      <div class="go-stat">
        <div class="go-val" id="goEP">0</div>
        <div class="go-label">EP Erhalten</div>
      </div>
      <div class="go-stat">
        <div class="go-val" id="goKills">0</div>
        <div class="go-label">Kills</div>
      </div>
    </div>
    <button class="go-btn" onclick="game.newRun()">Neuer Run</button>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// ILZARAH'S GUARDIAN — GAME ENGINE
// Phase 0 Prototype: Station Select → Build → Combat → Loop
// ═══════════════════════════════════════════════════════

// ── Station Data ──
const STATIONS = [
  { id: 0, name: "Kreuzstation", hp: 800, shield: 200, dmgBonus: 0.15, crit: 0.05, slots: { weapon: 5, defense: 2, resource: 1 }, locked: false, desc: "Offensiv — Hoher Schaden, wenig Schild" },
  { id: 1, name: "Sternstation", hp: 1200, shield: 400, dmgBonus: 0.0, crit: 0.02, slots: { weapon: 2, defense: 4, resource: 2 }, locked: false, desc: "Defensiv — Viel HP & Schild" },
  { id: 2, name: "Kreuz Mk.II", hp: 900, shield: 250, dmgBonus: 0.30, crit: 0.12, slots: { weapon: 7, defense: 2, resource: 1 }, locked: true, desc: "Offensiv+ — Sehr hoher Schaden & Crit" },
  { id: 3, name: "Stern Mk.II", hp: 1600, shield: 600, dmgBonus: 0.0, crit: 0.02, slots: { weapon: 2, defense: 6, resource: 2 }, locked: true, desc: "Defensiv+ — Maximaler Schutz" },
  { id: 4, name: "Nexus", hp: 1400, shield: 500, dmgBonus: 0.20, crit: 0.08, slots: { weapon: 5, defense: 4, resource: 3 }, locked: true, desc: "Hybrid — Ausgewogen, viele Slots" },
];

// ── Building Definitions ──
const BUILDINGS = {
  turret: { name: "Turret", cost: 50, type: "weapon", range: 150, fireRate: 1.0, damage: 15, color: "#FF3344", desc: "Auto-Targeting Turret\nDMG: 15 | Range: 150\nFireRate: 1.0/s" },
  shieldGen: { name: "Schild-Gen", cost: 75, type: "defense", shieldRegen: 2, color: "#00D4FF", desc: "Regeneriert Station-Schild\n+2 Schild/s" },
  vsuGen: { name: "VSU-Gen", cost: 60, type: "resource", vsuPerWave: 25, color: "#D4A03C", desc: "Erzeugt VSU pro Welle\n+25 VSU/Welle" },
};

// ── Game State ──
class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.state = 'menu'; // menu | build | combat | gameover
    this.station = null;
    this.stationHP = 0;
    this.stationMaxHP = 0;
    this.stationShield = 0;
    this.stationMaxShield = 0;
    this.vsu = 100;
    this.ep = 0;
    this.totalEP = 0;
    this.wave = 1;
    this.kills = 0;
    this.slots = [];
    this.enemies = [];
    this.projectiles = [];
    this.particles = [];
    this.selectedBuildType = null;
    this.lastTime = 0;
    this.stationCenter = { x: 0, y: 0 };
    this.hoveredSlot = null;
    this.shakeTimer = 0;
    this.shakeIntensity = 0;
    this.bannerTimer = 0;
    this.bannerText = '';
    this.combatTimer = 0;
    this.spawnQueue = [];
    this.spawnTimer = 0;
    this.waveEnemyCount = 0;
    this.waveEnemiesSpawned = 0;
    this.waveEnemiesDefeated = 0;
    this.damageNumbers = [];
    this.gridPulse = 0;
    this.ambientParticles = [];

    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.canvas.addEventListener('click', (e) => this.onClick(e));
    this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));

    this.renderStationSelect();
    this.loop(0);
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.stationCenter = { x: this.canvas.width / 2, y: this.canvas.height / 2 };
  }

  // ── Station Selection ──
  renderStationSelect() {
    const grid = document.getElementById('stationGrid');
    grid.innerHTML = '';
    STATIONS.forEach(s => {
      const totalSlots = s.slots.weapon + s.slots.defense + s.slots.resource;
      const card = document.createElement('div');
      card.className = 'station-card' + (s.locked ? ' locked' : '');
      card.innerHTML = `
        <div class="station-name">${s.name}</div>
        <div class="station-stat"><span class="label">HP</span><span class="val def">${s.hp}</span></div>
        <div class="station-stat"><span class="label">Schild</span><span class="val def">${s.shield}</span></div>
        <div class="station-stat"><span class="label">Damage</span><span class="val dmg">+${Math.round(s.dmgBonus*100)}%</span></div>
        <div class="station-stat"><span class="label">Crit</span><span class="val dmg">${Math.round(s.crit*100)}%</span></div>
        <div class="station-slots">${totalSlots} SLOTS (${s.slots.weapon}W/${s.slots.defense}D/${s.slots.resource}R)</div>
      `;
      if (!s.locked) {
        card.addEventListener('click', () => this.selectStation(s));
      }
      grid.appendChild(card);
    });
  }

  selectStation(station) {
    this.station = station;
    this.stationHP = station.hp;
    this.stationMaxHP = station.hp;
    this.stationShield = station.shield;
    this.stationMaxShield = station.shield;
    this.vsu = 100;
    this.wave = 1;
    this.kills = 0;
    this.ep = 0;
    this.enemies = [];
    this.projectiles = [];
    this.particles = [];
    this.damageNumbers = [];

    this.generateSlots();

    document.getElementById('stationSelect').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('buildUI').style.display = 'flex';
    this.state = 'build';
    this.showBanner(`WELLE ${this.wave} — BAUEN`);
    this.updateHUD();
    this.updateBuildButtons();
  }

  generateSlots() {
    this.slots = [];
    const s = this.station.slots;
    const allSlots = [];
    for (let i = 0; i < s.weapon; i++) allSlots.push('weapon');
    for (let i = 0; i < s.defense; i++) allSlots.push('defense');
    for (let i = 0; i < s.resource; i++) allSlots.push('resource');

    const total = allSlots.length;
    const ringRadius = Math.min(this.canvas.width, this.canvas.height) * 0.22;

    for (let i = 0; i < total; i++) {
      const angle = (i / total) * Math.PI * 2 - Math.PI / 2;
      this.slots.push({
        x: this.stationCenter.x + Math.cos(angle) * ringRadius,
        y: this.stationCenter.y + Math.sin(angle) * ringRadius,
        type: allSlots[i],
        building: null,
        angle: angle,
        radius: 22,
        pulsePhase: Math.random() * Math.PI * 2,
      });
    }
  }

  // ── Building Placement ──
  buyTurret() { this.selectedBuildType = 'turret'; }
  buyShieldGen() { this.selectedBuildType = 'shieldGen'; }
  buyVSUGen() { this.selectedBuildType = 'vsuGen'; }

  placeBuilding(slot) {
    if (!this.selectedBuildType || slot.building) return;
    const bDef = BUILDINGS[this.selectedBuildType];
    if (bDef.type !== slot.type) {
      this.showBanner("FALSCHER SLOT-TYP!");
      return;
    }
    if (this.vsu < bDef.cost) {
      this.showBanner("NICHT GENUG VSU!");
      return;
    }

    this.vsu -= bDef.cost;
    slot.building = {
      type: this.selectedBuildType,
      ...bDef,
      cooldown: 0,
      targetEnemy: null,
    };
    this.selectedBuildType = null;
    this.updateHUD();
    this.updateBuildButtons();

    // Placement particle effect
    for (let i = 0; i < 8; i++) {
      this.particles.push({
        x: slot.x, y: slot.y,
        vx: (Math.random() - 0.5) * 100,
        vy: (Math.random() - 0.5) * 100,
        life: 0.5,
        maxLife: 0.5,
        color: bDef.color,
        size: 3,
      });
    }
  }

  updateBuildButtons() {
    document.getElementById('btnTurret').disabled = this.vsu < BUILDINGS.turret.cost;
    document.getElementById('btnShieldGen').disabled = this.vsu < BUILDINGS.shieldGen.cost;
    document.getElementById('btnVSUGen').disabled = this.vsu < BUILDINGS.vsuGen.cost;
  }

  // ── Combat ──
  startCombat() {
    if (this.state !== 'build') return;
    this.state = 'combat';
    this.selectedBuildType = null;
    document.getElementById('buildUI').style.display = 'none';
    document.getElementById('hudPhase').textContent = 'KAMPF';

    // Calculate enemy count for this wave
    this.waveEnemyCount = 3 + Math.floor(this.wave * 1.5);
    this.waveEnemiesSpawned = 0;
    this.waveEnemiesDefeated = 0;
    this.spawnTimer = 0;

    this.showBanner(`WELLE ${this.wave} — KAMPF!`);
  }

  spawnEnemy() {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.max(this.canvas.width, this.canvas.height) * 0.6;
    const hp = 30 + this.wave * 5;
    const speed = 55 + Math.random() * 15;

    // Vary enemy types based on wave
    let enemyType = 'normal';
    let sizeMultiplier = 1;
    let hpMultiplier = 1;
    let vsuReward = 8 + this.wave;

    if (this.wave >= 3 && Math.random() < 0.15) {
      enemyType = 'elite';
      sizeMultiplier = 1.5;
      hpMultiplier = 2.5;
      vsuReward *= 3;
    }

    this.enemies.push({
      x: this.stationCenter.x + Math.cos(angle) * dist,
      y: this.stationCenter.y + Math.sin(angle) * dist,
      hp: hp * hpMultiplier,
      maxHP: hp * hpMultiplier,
      speed: speed,
      damage: 10 + Math.floor(this.wave * 1.5),
      radius: 10 * sizeMultiplier,
      type: enemyType,
      vsuReward: vsuReward,
      hitFlash: 0,
    });
    this.waveEnemiesSpawned++;
  }

  // ── Game Over ──
  triggerGameOver() {
    this.state = 'gameover';
    const epEarned = Math.floor(this.wave * 5 + this.kills * 0.5);
    this.totalEP += epEarned;

    document.getElementById('goWaves').textContent = this.wave;
    document.getElementById('goEP').textContent = epEarned;
    document.getElementById('goKills').textContent = this.kills;
    document.getElementById('gameOverScreen').style.display = 'flex';
    document.getElementById('buildUI').style.display = 'none';
    document.getElementById('hud').style.display = 'none';
  }

  waveCompleted() {
    const vsuFromGens = this.slots.filter(s => s.building && s.building.type === 'vsuGen')
      .reduce((sum, s) => sum + s.building.vsuPerWave, 0);
    const vsuEarned = 20 + this.wave * 5 + vsuFromGens;
    this.vsu += vsuEarned;

    // Milestone every 5 waves
    if (this.wave % 5 === 0) {
      const epMilestone = this.wave * 3;
      this.ep += epMilestone;
      this.totalEP += epMilestone;
      this.showBanner(`MEILENSTEIN! +${epMilestone} EP`);
    } else {
      this.showBanner(`WELLE ${this.wave} GESCHAFFT! +${vsuEarned} VSU`);
    }

    this.wave++;
    this.state = 'build';
    document.getElementById('buildUI').style.display = 'flex';
    document.getElementById('hudPhase').textContent = 'BUILD';

    // Regenerate some shield
    const shieldRegen = this.slots.filter(s => s.building && s.building.type === 'shieldGen')
      .reduce((sum, s) => sum + s.building.shieldRegen * 15, 0);
    this.stationShield = Math.min(this.stationMaxShield, this.stationShield + shieldRegen + 10);

    this.updateHUD();
    this.updateBuildButtons();
  }

  newRun() {
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('stationSelect').style.display = 'flex';
    this.state = 'menu';
    this.enemies = [];
    this.projectiles = [];
    this.particles = [];
    this.damageNumbers = [];
    this.renderStationSelect();
  }

  // ── Update ──
  update(dt) {
    this.gridPulse += dt;

    // Update ambient particles
    this.updateAmbientParticles(dt);

    if (this.state === 'combat') {
      this.updateCombat(dt);
    }

    // Update particles
    this.particles = this.particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Update damage numbers
    this.damageNumbers = this.damageNumbers.filter(d => {
      d.y -= 40 * dt;
      d.life -= dt;
      return d.life > 0;
    });

    // Shake
    if (this.shakeTimer > 0) this.shakeTimer -= dt;

    // Banner
    if (this.bannerTimer > 0) {
      this.bannerTimer -= dt;
      const el = document.getElementById('waveBanner');
      el.style.opacity = this.bannerTimer > 0.3 ? '1' : String(this.bannerTimer / 0.3);
    }
  }

  updateCombat(dt) {
    // Spawn enemies
    this.spawnTimer -= dt;
    if (this.spawnTimer <= 0 && this.waveEnemiesSpawned < this.waveEnemyCount) {
      this.spawnEnemy();
      this.spawnTimer = 0.6 - Math.min(0.35, this.wave * 0.02);
    }

    // Move enemies
    for (const enemy of this.enemies) {
      const dx = this.stationCenter.x - enemy.x;
      const dy = this.stationCenter.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 35) {
        enemy.x += (dx / dist) * enemy.speed * dt;
        enemy.y += (dy / dist) * enemy.speed * dt;
      } else {
        // Enemy reached station
        this.damageStation(enemy.damage);
        enemy.hp = 0;
        this.waveEnemiesDefeated++;

        // Impact particles
        for (let i = 0; i < 6; i++) {
          this.particles.push({
            x: enemy.x, y: enemy.y,
            vx: (Math.random() - 0.5) * 150,
            vy: (Math.random() - 0.5) * 150,
            life: 0.4, maxLife: 0.4,
            color: '#FF3344', size: 4,
          });
        }
      }

      if (enemy.hitFlash > 0) enemy.hitFlash -= dt;
    }

    // Remove dead enemies
    this.enemies = this.enemies.filter(e => e.hp > 0);

    // Turret targeting & shooting
    for (const slot of this.slots) {
      if (!slot.building || slot.building.type !== 'turret') continue;
      const turret = slot.building;
      turret.cooldown -= dt;

      // Find nearest enemy in range
      let nearestEnemy = null;
      let nearestDist = Infinity;

      for (const enemy of this.enemies) {
        const dx = enemy.x - slot.x;
        const dy = enemy.y - slot.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < turret.range && dist < nearestDist) {
          nearestDist = dist;
          nearestEnemy = enemy;
        }
      }

      turret.targetEnemy = nearestEnemy;

      if (nearestEnemy && turret.cooldown <= 0) {
        turret.cooldown = 1 / turret.fireRate;
        const dmg = turret.damage * (1 + this.station.dmgBonus);
        const isCrit = Math.random() < this.station.crit;
        const finalDmg = isCrit ? dmg * 2 : dmg;

        this.projectiles.push({
          x: slot.x, y: slot.y,
          targetEnemy: nearestEnemy,
          speed: 400,
          damage: finalDmg,
          isCrit: isCrit,
          trail: [],
        });

        // Muzzle flash
        this.particles.push({
          x: slot.x, y: slot.y,
          vx: 0, vy: 0,
          life: 0.1, maxLife: 0.1,
          color: '#FF6644', size: 8,
        });
      }
    }

    // Update projectiles
    this.projectiles = this.projectiles.filter(p => {
      if (!p.targetEnemy || p.targetEnemy.hp <= 0) return false;

      const dx = p.targetEnemy.x - p.x;
      const dy = p.targetEnemy.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Trail
      p.trail.push({ x: p.x, y: p.y, life: 0.15 });
      p.trail = p.trail.filter(t => { t.life -= dt; return t.life > 0; });

      if (dist < 12) {
        // Hit!
        p.targetEnemy.hp -= p.damage;
        p.targetEnemy.hitFlash = 0.1;

        // Damage number
        this.damageNumbers.push({
          x: p.targetEnemy.x,
          y: p.targetEnemy.y - 15,
          value: Math.round(p.damage),
          life: 0.8,
          maxLife: 0.8,
          isCrit: p.isCrit,
        });

        if (p.targetEnemy.hp <= 0) {
          this.kills++;
          this.vsu += p.targetEnemy.vsuReward;
          this.waveEnemiesDefeated++;

          // Death particles
          for (let i = 0; i < 10; i++) {
            this.particles.push({
              x: p.targetEnemy.x, y: p.targetEnemy.y,
              vx: (Math.random() - 0.5) * 200,
              vy: (Math.random() - 0.5) * 200,
              life: 0.6, maxLife: 0.6,
              color: p.targetEnemy.type === 'elite' ? '#FFD700' : '#FF6644',
              size: p.targetEnemy.type === 'elite' ? 5 : 3,
            });
          }
        }

        // Impact particles
        for (let i = 0; i < 3; i++) {
          this.particles.push({
            x: p.x, y: p.y,
            vx: (Math.random() - 0.5) * 80,
            vy: (Math.random() - 0.5) * 80,
            life: 0.2, maxLife: 0.2,
            color: p.isCrit ? '#FFD700' : '#FF3344', size: 2,
          });
        }
        return false;
      }

      p.x += (dx / dist) * p.speed * dt;
      p.y += (dy / dist) * p.speed * dt;
      return true;
    });

    // Check wave complete
    if (this.waveEnemiesSpawned >= this.waveEnemyCount && this.enemies.length === 0) {
      this.waveCompleted();
    }

    this.updateHUD();
  }

  damageStation(dmg) {
    if (this.stationShield > 0) {
      const absorbed = Math.min(this.stationShield, dmg);
      this.stationShield -= absorbed;
      dmg -= absorbed;
    }
    this.stationHP -= dmg;
    this.shakeTimer = 0.3;
    this.shakeIntensity = 5;

    if (this.stationHP <= 0) {
      this.stationHP = 0;
      this.triggerGameOver();
    }
  }

  updateAmbientParticles(dt) {
    // Spawn ambient dust
    if (Math.random() < 0.3) {
      this.ambientParticles.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        life: 3 + Math.random() * 3,
        maxLife: 6,
        size: 1 + Math.random(),
      });
    }
    this.ambientParticles = this.ambientParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  // ── HUD ──
  updateHUD() {
    document.getElementById('hudWave').textContent = this.wave;
    document.getElementById('hudVSU').textContent = Math.floor(this.vsu);
    document.getElementById('hudHP').textContent = Math.floor(this.stationHP);
    document.getElementById('hudShield').textContent = Math.floor(this.stationShield);
    document.getElementById('hudEP').textContent = this.totalEP;
  }

  showBanner(text) {
    this.bannerText = text;
    this.bannerTimer = 2.0;
    const el = document.getElementById('waveBanner');
    el.textContent = text;
    el.style.opacity = '1';
  }

  // ── Render ──
  render() {
    const ctx = this.ctx;
    const W = this.canvas.width;
    const H = this.canvas.height;

    // Camera shake
    let shakeX = 0, shakeY = 0;
    if (this.shakeTimer > 0) {
      shakeX = (Math.random() - 0.5) * this.shakeIntensity * 2;
      shakeY = (Math.random() - 0.5) * this.shakeIntensity * 2;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Clear
    ctx.fillStyle = '#0D0D0F';
    ctx.fillRect(-10, -10, W + 20, H + 20);

    if (this.state === 'menu') {
      this.renderMenuBackground(ctx, W, H);
      ctx.restore();
      return;
    }

    // Background grid
    this.renderBackgroundGrid(ctx, W, H);

    // Ambient particles
    for (const p of this.ambientParticles) {
      const alpha = (p.life / p.maxLife) * 0.15;
      ctx.fillStyle = `rgba(200,184,138,${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Station
    this.renderStation(ctx);

    // Slots
    this.renderSlots(ctx);

    // Turret range indicators (during build)
    if (this.state === 'build' && this.selectedBuildType === 'turret') {
      for (const slot of this.slots) {
        if (!slot.building && slot.type === 'weapon') {
          ctx.beginPath();
          ctx.arc(slot.x, slot.y, BUILDINGS.turret.range, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(255,51,68,0.1)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    // Enemies
    for (const enemy of this.enemies) {
      this.renderEnemy(ctx, enemy);
    }

    // Projectiles
    for (const proj of this.projectiles) {
      this.renderProjectile(ctx, proj);
    }

    // Particles
    for (const p of this.particles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Damage numbers
    for (const d of this.damageNumbers) {
      const alpha = d.life / d.maxLife;
      ctx.globalAlpha = alpha;
      ctx.font = d.isCrit ? 'bold 18px "Share Tech Mono"' : '14px "Share Tech Mono"';
      ctx.fillStyle = d.isCrit ? '#FFD700' : '#FF3344';
      ctx.textAlign = 'center';
      ctx.fillText(d.value, d.x, d.y);
    }
    ctx.globalAlpha = 1;

    // Turret target lines
    if (this.state === 'combat') {
      for (const slot of this.slots) {
        if (slot.building && slot.building.type === 'turret' && slot.building.targetEnemy) {
          const t = slot.building.targetEnemy;
          ctx.beginPath();
          ctx.moveTo(slot.x, slot.y);
          ctx.lineTo(t.x, t.y);
          ctx.strokeStyle = 'rgba(255,51,68,0.08)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    // Station HP bar (below station)
    this.renderStationHPBar(ctx);

    ctx.restore();
  }

  renderMenuBackground(ctx, W, H) {
    // Subtle radial gradient
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.5);
    grad.addColorStop(0, '#1A1A1F');
    grad.addColorStop(1, '#0D0D0F');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Ambient particles on menu too
    for (const p of this.ambientParticles) {
      const alpha = (p.life / p.maxLife) * 0.1;
      ctx.fillStyle = `rgba(212,160,60,${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  renderBackgroundGrid(ctx, W, H) {
    ctx.strokeStyle = 'rgba(212,160,60,0.04)';
    ctx.lineWidth = 1;
    const gridSize = 40;
    for (let x = 0; x < W; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  renderStation(ctx) {
    const cx = this.stationCenter.x;
    const cy = this.stationCenter.y;

    // Station glow
    const glowAlpha = 0.08 + Math.sin(this.gridPulse * 1.5) * 0.03;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
    grad.addColorStop(0, `rgba(212,160,60,${glowAlpha * 2})`);
    grad.addColorStop(1, 'rgba(212,160,60,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - 80, cy - 80, 160, 160);

    // Station body (hexagonal shape)
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
      const r = 28;
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();

    // Fill based on HP
    const hpRatio = this.stationHP / this.stationMaxHP;
    const r = Math.floor(26 + (1 - hpRatio) * 50);
    const g = Math.floor(26 + hpRatio * 10);
    const b = 31;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fill();

    ctx.strokeStyle = hpRatio > 0.5 ? 'rgba(212,160,60,0.6)' : 'rgba(255,51,68,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Inner detail
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
      const r2 = 14;
      const px = cx + Math.cos(angle) * r2;
      const py = cy + Math.sin(angle) * r2;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(212,160,60,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fillStyle = this.stationShield > 0 ? '#00D4FF' : '#D4A03C';
    ctx.fill();
  }

  renderSlots(ctx) {
    const pulse = Math.sin(this.gridPulse * 2) * 0.15;

    for (const slot of this.slots) {
      if (slot.building) {
        // Render building
        this.renderBuilding(ctx, slot);
      } else {
        // Empty slot
        const colors = {
          weapon: { stroke: 'rgba(255,51,68,', fill: 'rgba(255,51,68,' },
          defense: { stroke: 'rgba(0,212,255,', fill: 'rgba(0,212,255,' },
          resource: { stroke: 'rgba(212,160,60,', fill: 'rgba(212,160,60,' },
        };
        const c = colors[slot.type];
        const isHovered = this.hoveredSlot === slot;
        const baseAlpha = isHovered ? 0.5 : 0.2 + pulse;
        const fillAlpha = isHovered ? 0.1 : 0.03;

        // Slot indicator
        ctx.beginPath();
        ctx.arc(slot.x, slot.y, slot.radius, 0, Math.PI * 2);
        ctx.strokeStyle = c.stroke + baseAlpha + ')';
        ctx.lineWidth = isHovered ? 2 : 1;
        ctx.stroke();
        ctx.fillStyle = c.fill + fillAlpha + ')';
        ctx.fill();

        // Slot type icon
        ctx.font = '9px "Share Tech Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = c.stroke + (baseAlpha + 0.1) + ')';
        const labels = { weapon: 'W', defense: 'D', resource: 'R' };
        ctx.fillText(labels[slot.type], slot.x, slot.y);

        // Connection line to station
        ctx.beginPath();
        ctx.moveTo(slot.x, slot.y);
        ctx.lineTo(this.stationCenter.x, this.stationCenter.y);
        ctx.strokeStyle = 'rgba(212,160,60,0.05)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  renderBuilding(ctx, slot) {
    const b = slot.building;

    // Connection line
    ctx.beginPath();
    ctx.moveTo(slot.x, slot.y);
    ctx.lineTo(this.stationCenter.x, this.stationCenter.y);
    ctx.strokeStyle = `${b.color}22`;
    ctx.lineWidth = 1;
    ctx.stroke();

    if (b.type === 'turret') {
      // Range circle (subtle)
      if (this.state === 'combat') {
        ctx.beginPath();
        ctx.arc(slot.x, slot.y, b.range, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,51,68,0.04)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Turret body
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = '#1A1A1F';
      ctx.fill();
      ctx.strokeStyle = b.cooldown > 0.7 / b.fireRate ? '#FF6644' : '#FF3344';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Turret barrel (point toward target or default)
      let barrelAngle = slot.angle;
      if (b.targetEnemy) {
        barrelAngle = Math.atan2(b.targetEnemy.y - slot.y, b.targetEnemy.x - slot.x);
      }
      ctx.beginPath();
      ctx.moveTo(slot.x, slot.y);
      ctx.lineTo(slot.x + Math.cos(barrelAngle) * 18, slot.y + Math.sin(barrelAngle) * 18);
      ctx.strokeStyle = '#FF3344';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Center dot
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#FF3344';
      ctx.fill();

    } else if (b.type === 'shieldGen') {
      // Shield generator
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = '#1A1A1F';
      ctx.fill();
      ctx.strokeStyle = '#00D4FF';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Shield icon (arc segments)
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 + this.gridPulse * 0.8;
        ctx.beginPath();
        ctx.arc(slot.x, slot.y, 8, a, a + 0.8);
        ctx.strokeStyle = '#00D4FF';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

    } else if (b.type === 'vsuGen') {
      // VSU Generator
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = '#1A1A1F';
      ctx.fill();
      ctx.strokeStyle = '#D4A03C';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Diamond icon
      ctx.beginPath();
      ctx.moveTo(slot.x, slot.y - 7);
      ctx.lineTo(slot.x + 5, slot.y);
      ctx.lineTo(slot.x, slot.y + 7);
      ctx.lineTo(slot.x - 5, slot.y);
      ctx.closePath();
      ctx.fillStyle = 'rgba(212,160,60,0.3)';
      ctx.fill();
      ctx.strokeStyle = '#D4A03C';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  renderEnemy(ctx, enemy) {
    const isElite = enemy.type === 'elite';

    // Enemy body
    ctx.beginPath();
    if (isElite) {
      // Elite: diamond shape
      ctx.moveTo(enemy.x, enemy.y - enemy.radius);
      ctx.lineTo(enemy.x + enemy.radius, enemy.y);
      ctx.lineTo(enemy.x, enemy.y + enemy.radius);
      ctx.lineTo(enemy.x - enemy.radius, enemy.y);
      ctx.closePath();
    } else {
      ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
    }

    const baseColor = isElite ? '#FFD700' : '#88FF44';
    const flashColor = '#FFFFFF';
    ctx.fillStyle = enemy.hitFlash > 0 ? flashColor : (isElite ? '#332800' : '#1A2A10');
    ctx.fill();
    ctx.strokeStyle = enemy.hitFlash > 0 ? flashColor : baseColor;
    ctx.lineWidth = isElite ? 2 : 1.5;
    ctx.stroke();

    // HP bar
    const barW = enemy.radius * 2.5;
    const barH = 3;
    const barX = enemy.x - barW / 2;
    const barY = enemy.y - enemy.radius - 8;
    const hpRatio = enemy.hp / enemy.maxHP;

    ctx.fillStyle = 'rgba(13,13,15,0.7)';
    ctx.fillRect(barX, barY, barW, barH);

    const hpColor = hpRatio > 0.5 ? '#88FF44' : (hpRatio > 0.25 ? '#FFD700' : '#FF3344');
    ctx.fillStyle = hpColor;
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
  }

  renderProjectile(ctx, proj) {
    // Trail
    for (const t of proj.trail) {
      const alpha = t.life / 0.15;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 1.5 * alpha, 0, Math.PI * 2);
      ctx.fillStyle = proj.isCrit ? `rgba(255,215,0,${alpha * 0.5})` : `rgba(255,51,68,${alpha * 0.5})`;
      ctx.fill();
    }

    // Projectile
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, proj.isCrit ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = proj.isCrit ? '#FFD700' : '#FF3344';
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, proj.isCrit ? 8 : 6, 0, Math.PI * 2);
    ctx.fillStyle = proj.isCrit ? 'rgba(255,215,0,0.15)' : 'rgba(255,51,68,0.15)';
    ctx.fill();
  }

  renderStationHPBar(ctx) {
    const cx = this.stationCenter.x;
    const cy = this.stationCenter.y;
    const barW = 80;
    const barH = 6;
    const barX = cx - barW / 2;
    const barY = cy + 40;

    // Background
    ctx.fillStyle = 'rgba(13,13,15,0.8)';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);

    // HP
    const hpRatio = this.stationHP / this.stationMaxHP;
    ctx.fillStyle = hpRatio > 0.5 ? '#D4A03C' : (hpRatio > 0.25 ? '#FF6644' : '#FF3344');
    ctx.fillRect(barX, barY, barW * hpRatio, barH);

    // Shield overlay
    if (this.stationMaxShield > 0) {
      const shieldRatio = this.stationShield / this.stationMaxShield;
      ctx.fillStyle = 'rgba(0,212,255,0.3)';
      ctx.fillRect(barX, barY, barW * shieldRatio, barH);
    }

    // Border
    ctx.strokeStyle = 'rgba(212,160,60,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
  }

  // ── Input ──
  onClick(e) {
    if (this.state !== 'build') return;

    const rect = this.canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    for (const slot of this.slots) {
      const dx = mx - slot.x;
      const dy = my - slot.y;
      if (dx * dx + dy * dy < slot.radius * slot.radius * 1.5) {
        if (this.selectedBuildType) {
          this.placeBuilding(slot);
        }
        return;
      }
    }
  }

  onMouseMove(e) {
    if (this.state !== 'build') {
      this.hoveredSlot = null;
      document.getElementById('tooltip').style.display = 'none';
      return;
    }

    const rect = this.canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    this.hoveredSlot = null;
    for (const slot of this.slots) {
      const dx = mx - slot.x;
      const dy = my - slot.y;
      if (dx * dx + dy * dy < slot.radius * slot.radius * 1.5) {
        this.hoveredSlot = slot;
        break;
      }
    }

    const tooltip = document.getElementById('tooltip');
    if (this.hoveredSlot) {
      let text = '';
      if (this.hoveredSlot.building) {
        text = this.hoveredSlot.building.desc;
      } else {
        const typeNames = { weapon: 'Waffen-Slot', defense: 'Verteidigungs-Slot', resource: 'Ressourcen-Slot' };
        text = typeNames[this.hoveredSlot.type];
        if (this.selectedBuildType) {
          const bDef = BUILDINGS[this.selectedBuildType];
          if (bDef.type === this.hoveredSlot.type) {
            text += '\nKlicken zum Platzieren';
          } else {
            text += '\nFalscher Typ!';
          }
        }
      }
      tooltip.textContent = text;
      tooltip.style.display = 'block';
      tooltip.style.whiteSpace = 'pre-line';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY + 15) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  }

  // ── Main Loop ──
  loop(time) {
    const dt = Math.min((time - this.lastTime) / 1000, 0.05);
    this.lastTime = time;

    this.update(dt);
    this.render();

    requestAnimationFrame((t) => this.loop(t));
  }
}

// ── Start Game ──
const game = new Game();
</script>
